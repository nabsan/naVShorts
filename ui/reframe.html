<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>naVShorts - Reframe</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="./assets/navshorts-icon-64.png" alt="naVShorts icon" class="brandIcon" />
      <div>
        <div class="brandName">naVShorts</div>
        <div class="brandSub">Vertical video workflow studio</div>
      </div>
    </div>
    <nav class="tabs" aria-label="Workspace tabs">
      <a class="tab active" href="./reframe.html">1. Reframe</a>
      <a class="tab" href="./reframe_assist.html">1B. Reframe Assist</a>
      <a class="tab" href="./index.html">2. Effects</a>
    </nav>
  </header>

  <main class="layout">
    <section class="panel">
      <h1>Reframe Workspace</h1>
      <p class="sub">Step 1: Convert horizontal source into vertical 9:16 base with face tracking.</p>

      <div class="row row-single topActionRow">
        <button id="verifyBtn" class="secondary">Verify FFmpeg/ONNX</button>
      </div>

      <div class="fieldRow fieldRow3">
        <label for="sourceVideoPath" class="inlineLabel">Source video path</label>
        <input id="sourceVideoPath" placeholder="C:\\videos\\source_16x9.mp4" readonly />
        <button id="openSourceBtn">Select Source Video</button>
      </div>

      <div class="fieldRow fieldRow3">
        <label for="targetFacePath" class="inlineLabel">Target face folder path</label>
        <input id="targetFacePath" placeholder="S:\\tools\\codex\\waka_images" readonly />
        <button id="pickTargetFaceBtn" class="secondary">Select Target Face Folder</button>
      </div>


      <div class="fieldRow fieldRow3">
        <label for="assistJsonPath" class="inlineLabel">Assist JSON path</label>
        <input id="assistJsonPath" placeholder="C:\videos\source_assist_yymmddhhmmss.json" readonly />
        <button id="pickAssistJsonBtn" class="secondary">Select Assist JSON</button>
      </div>

      <div class="fieldRow fieldRow2">
        <label for="trackingEngine" class="inlineLabel">Tracking engine</label>
        <select id="trackingEngine">
          <option value="faceIdentity" selected>Face Identity (ONNX)</option>
          <option value="yoloDeepsortPerson">Person YOLO + DeepSORT</option>
          <option value="yoloBytetrackArcface">Person YOLO + ByteTrack + ArcFace</option>
          <option value="manualAssistJson">Manual Assist JSON</option>
        </select>
      </div>
      <div class="row">
        <button id="scoreFaceFolderBtn" class="secondary">Score Face Folder</button>
        <button id="moveExcludedBtn" class="secondary">Score + Move Excluded (botu)</button>
      </div>

      <div class="sliderRow">
        <div class="sliderLabel">Face tracking strength</div>
        <div id="trackingStrengthValue" class="sliderValue">0.72</div>
        <input id="trackingStrength" type="range" min="0" max="1" step="0.01" value="0.72" />
      </div>

      <div class="sliderRow">
        <div class="sliderLabel">Identity threshold</div>
        <div id="identityThresholdValue" class="sliderValue">0.58</div>
        <input id="identityThreshold" type="range" min="0" max="1" step="0.01" value="0.58" />
      </div>

      <div class="sliderRow">
        <div class="sliderLabel">Stability</div>
        <div id="stabilityValue" class="sliderValue">0.68</div>
        <input id="stability" type="range" min="0" max="1" step="0.01" value="0.68" />
      </div>

      <div class="fieldRow fieldRow2">
        <label for="reframeOutputPath" class="inlineLabel">Reframe output path</label>
        <input id="reframeOutputPath" placeholder="C:\\videos\\source_reframed_yymmddhhmmss.mp4" />
      </div>

      <div class="fieldRow fieldRow2">
        <label for="encoder" class="inlineLabel">Video encoder</label>
        <select id="encoder">
          <option value="auto" selected>Auto (recommended)</option>
          <option value="cpu">CPU (libx264)</option>
          <option value="nvidia">NVIDIA (NVENC)</option>
          <option value="intel">Intel (QSV)</option>
          <option value="amd">AMD (AMF)</option>
        </select>
      </div>

      <div class="row">
        <button id="previewBtn" class="secondary">Render Reframe Preview</button>
        <button id="exportBtn">Export Reframed Video</button>
      </div>

      <button id="sendToEffectsBtn" class="secondary">Send Reframed Video To Effects</button>
    </section>

    <section class="panel">
      <h2>Status</h2>
      <div class="progressWrap">
        <progress id="renderProgress" max="1" value="0"></progress>
        <div id="etaInfo" class="eta">Idle</div>
      </div>
      <pre id="statusInfo">Idle.</pre>

      <h2>Project</h2>
      <pre id="projectInfo">No video loaded.</pre>
    </section>
  </main>

  <script type="module" src="./reframe.js?v=20260313-1"></script>
</body>
</html>
