<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>naVShorts - Effects</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="./assets/navshorts-icon-64.png" alt="naVShorts icon" class="brandIcon" />
      <div>
        <div class="brandName">naVShorts</div>
        <div class="brandSub">Vertical video workflow studio</div>
      </div>
    </div>
    <nav class="tabs" aria-label="Workspace tabs">
      <a class="tab" href="./reframe.html">1. Reframe</a>
      <a class="tab active" href="./index.html">2. Effects</a>
    </nav>
  </header>

  <main class="layout">
    <section class="panel">
      <h1>Effects Workspace</h1>
      <p class="sub">Step 2: Add zoom/beat effects and export final vertical video.</p>

      <div class="row row-single topActionRow">
        <button id="verifyBtn" class="secondary">Verify FFmpeg</button>
      </div>

      <div class="fieldRow fieldRow3">
        <label for="videoPath" class="inlineLabel">Video file path</label>
        <input id="videoPath" placeholder="C:\\videos\\clip.mp4" readonly />
        <button id="openBtn">Select & Open Video</button>
      </div>

      <h2>Effects</h2>
      <div class="fieldRow fieldRow2">
        <label for="zoomMode" class="inlineLabel">Zoom mode</label>
        <select id="zoomMode">
          <option value="none">None</option>
          <option value="zoomIn" selected>Zoom In</option>
          <option value="zoomOut">Zoom Out</option>
          <option value="zoomInOutBeat">Zoom In & Out (Beat Sync)</option>
          <option value="zoomInOutLoop">Zoom In & Out (Loop)</option>
          <option value="zoomSineSmooth">Zoom Sine Smooth (tmix optional)</option>
        </select>
      </div>

      <div class="sliderRow">
        <div class="sliderLabel">Zoom strength</div>
        <div id="zoomStrengthValue" class="sliderValue">0.18</div>
        <input id="zoomStrength" type="range" min="0" max="1" step="0.01" value="0.18" />
      </div>

      <div class="sliderRow">
        <div class="sliderLabel">Bounce strength</div>
        <div id="bounceStrengthValue" class="sliderValue">0.16</div>
        <input id="bounceStrength" type="range" min="0" max="1" step="0.01" value="0.16" />
      </div>

      <div class="sliderRow">
        <div class="sliderLabel">Beat sensitivity</div>
        <div id="beatSensitivityValue" class="sliderValue">0.55</div>
        <input id="beatSensitivity" type="range" min="0" max="1" step="0.01" value="0.55" />
      </div>

      <div class="sliderRow">
        <div class="sliderLabel">Motion blur strength</div>
        <div id="motionBlurStrengthValue" class="sliderValue">0.00</div>
        <input id="motionBlurStrength" type="range" min="0" max="1" step="0.01" value="0.00" />
      </div>

      <div class="row">
        <button id="saveEffectsBtn" class="secondary">Apply Effects</button>
        <button id="analyzeBtn" class="secondary">Analyze Beats</button>
      </div>

      <h2>Render</h2>
      <div class="fieldRow fieldRow2">
        <label for="preset" class="inlineLabel">Preset</label>
        <select id="preset">
          <option value="shorts1080x1920" selected>YouTube Shorts (1080x1920)</option>
          <option value="reels1080x1920">Instagram Reels (1080x1920)</option>
          <option value="vertical4k2160x3840">Vertical 4K (2160x3840)</option>
        </select>
      </div>

      <div class="fieldRow fieldRow2">
        <label for="outputPath" class="inlineLabel">Output path</label>
        <input id="outputPath" placeholder="C:\\videos\\hoge_exported_yymmddhhmmss.mp4" />
      </div>

      <div class="fieldRow fieldRow2">
        <label for="encoder" class="inlineLabel">Video encoder</label>
        <select id="encoder">
          <option value="auto" selected>Auto (recommended)</option>
          <option value="cpu">CPU (libx264)</option>
          <option value="nvidia">NVIDIA (NVENC)</option>
          <option value="intel">Intel (QSV)</option>
          <option value="amd">AMD (AMF)</option>
        </select>
      </div>

      <div class="row">
        <button id="previewBtn" class="secondary">Render Preview</button>
        <button id="exportBtn">Export Final</button>
      </div>
    </section>

    <section class="panel">
      <h2>Status</h2>
      <div class="progressWrap">
        <progress id="renderProgress" max="1" value="0"></progress>
        <div id="etaInfo" class="eta">Idle</div>
      </div>
      <pre id="statusInfo">Idle.</pre>

      <h2>Project</h2>
      <pre id="projectInfo">No video loaded.</pre>
    </section>
  </main>

  <script type="module" src="./app.js?v=20260312-2"></script>
</body>
</html>
